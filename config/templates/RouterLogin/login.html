<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Router Management</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #ccc; padding: 20px; width: 300px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { background: #333; color: white; padding: 10px; margin: -20px -20px 20px -20px; text-align: center; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="header">SYSTEM LOGIN</div>
        <p style="font-size: 12px; color: #666;">Authentication required. Please enter your administrator credentials.</p>
        <form action="/login" method="post">
            <input type="text" name="login" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
