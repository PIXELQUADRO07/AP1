<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Login</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1e1e1e; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 300px; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #00ff00; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background-color: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border-radius: 5px; border: none; background-color: #00ff00; color: black; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #00cc00; }
        .info { font-size: 0.8rem; color: #888; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>WiFi Connection</h1>
        <p>Please log in to continue.</p>
        <form method="POST" action="/login">
            <input type="text" name="login" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">CONNECT</button>
        </form>
        <div class="info">
            Detected OS: <strong>{{ os }}</strong><br>
            Client IP: <strong>{{ client_ip }}</strong><br>
            {% if os == "iOS" %}
            <p style="color: #00acee;">Optimized for your Apple device</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
